<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Home Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Home Control</h1>
            <p id="status-bar">Connectant amb la llar...</p>
        </header>
        
        <div class="grid">
            <!-- Parental Controls -->
            <div class="card" id="card-nintendo">
                <div class="icon">🎮</div>
                <div class="info">
                    <h2>Nintendo Switch</h2>
                    <div class="status" id="status-nintendo">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>

            <div class="card" id="card-tv">
                <div class="icon">📺</div>
                <div class="info">
                    <h2>Samsung TV</h2>
                    <div class="status" id="status-tv">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>

            <!-- Dispositius Llar -->
            <div class="card" id="card-termo">
                <div class="icon">🌡️</div>
                <div class="info">
                    <h2>Termo</h2>
                    <div class="status" id="status-termo">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>

            <div class="card" id="card-piscina">
                <div class="icon">🏊</div>
                <div class="info">
                    <h2>Depuradora</h2>
                    <div class="status" id="status-piscina">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>

            <div class="card" id="card-ac-comedor">
                <div class="icon">❄️</div>
                <div class="info">
                    <h2>Aire Comedor</h2>
                    <div class="status" id="status-ac-comedor">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>

            <div class="card" id="card-ventilacio">
                <div class="icon">🌬️</div>
                <div class="info">
                    <h2>Ventilació</h2>
                    <div class="status" id="status-ventilacio">Llegint...</div>
                </div>
                <div class="toggle-indicator"></div>
            </div>
        </div>
        
        <footer>
            <p id="last-update">Actualitzat: --:--</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
